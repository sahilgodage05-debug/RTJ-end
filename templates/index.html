<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio Profile</title>
    <!-- Outfit Font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(20, 30, 48, 0.75);
            --accent-color: #3b82f6;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --success-color: #10b981;
            --alert-color: #f59e0b;
            --danger-color: #ef4444;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top, #1e293b 0%, #0b0f19 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            position: relative;
            overflow: hidden;
        }

        /* Abstract background glow shapes */
        .glow-sphere {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            top: 10%;
            left: 20%;
            z-index: 0;
            filter: blur(40px);
        }

        .glow-sphere-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            bottom: 10%;
            right: 15%;
            z-index: 0;
            filter: blur(50px);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 45px 40px;
            border-radius: 28px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 
                        0 0 80px rgba(59, 130, 246, 0.05);
            width: 360px;
            text-align: center;
            transform: translateY(30px);
            opacity: 0;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            z-index: 10;
        }

        h1 {
            color: var(--text-primary);
            font-size: 2.2rem;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff 0%, #93c5fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--accent-color);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
            margin-bottom: 28px;
        }

        p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .badge {
            background: rgba(239, 68, 68, 0.08);
            color: var(--danger-color);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.05);
        }

        .badge::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--danger-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--danger-color);
            animation: pulse 1.5s infinite alternate;
        }

        /* Toast Alert Notification */
        .toast {
            position: fixed;
            top: 24px;
            right: -420px;
            background: rgba(17, 24, 39, 0.95);
            border: 1px solid rgba(239, 68, 68, 0.3);
            backdrop-filter: blur(12px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 
                        0 0 25px rgba(239, 68, 68, 0.15);
            padding: 16px 20px;
            border-radius: 20px;
            width: 330px;
            display: flex;
            align-items: center;
            gap: 14px;
            z-index: 1000;
            transition: right 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .toast.show {
            right: 24px;
        }

        .toast-icon {
            font-size: 1.6rem;
            background: rgba(239, 68, 68, 0.1);
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .toast-content {
            flex-grow: 1;
            text-align: left;
        }

        .toast-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--danger-color);
            margin-bottom: 2px;
        }

        .toast-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .ip-highlight {
            color: var(--danger-color);
            font-weight: 600;
            font-family: monospace;
            background: rgba(239, 68, 68, 0.12);
            padding: 2px 6px;
            border-radius: 6px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .toast-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
            transition: color 0.2s, transform 0.2s;
        }

        .toast-close:hover {
            color: var(--text-primary);
            transform: scale(1.1);
        }

        /* Animations */
        @keyframes fadeInUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes pulse {
            to {
                opacity: 0.3;
            }
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .card {
                width: 85%;
                padding: 35px 25px;
            }
            .toast {
                width: calc(100% - 48px);
                right: -110%;
                top: 16px;
            }
            .toast.show {
                right: 24px;
            }
        }
    </style>
</head>

<body>
    <!-- Background lights -->
    <div class="glow-sphere"></div>
    <div class="glow-sphere-2"></div>

    <div class="card">
        <h1>Welcome to My Profile</h1>
        <div class="subtitle">Computer Science Student Project</div>
        <p>Hi! I am testing a Python-based backend server that logs networking data for security analysis.</p>
        <span class="badge">Status: Warning Active</span>
        
        <div style="color: var(--danger-color); font-weight: 600; margin-top: 22px; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 6px; animation: pulse 1.5s infinite alternate;">
            ⚠️ User IP and device related details shared
        </div>
    </div>

    <!-- Stunning Custom Toast Notification -->
    <div class="toast" id="ipToast">
        <div class="toast-icon">⚠️</div>
        <div class="toast-content">
            <div class="toast-title">Security Warning</div>
            <div class="toast-desc">Your IP Address: <span class="ip-highlight">{{ ip_address }}</span> is shared and logged.</div>
        </div>
        <button class="toast-close" onclick="closeToast()">&times;</button>
    </div>

    <script>
        window.onload = function() {
            // Client-side details capture and log
            fetch('/log_details', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    screen_resolution: window.screen.width + 'x' + window.screen.height,
                    platform: navigator.platform,
                    language: navigator.language,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
                })
            }).catch(err => console.log('Details logging failed: ', err));

            // Native Alert
            alert("Your IP address and device details are shared");
            
            // Premium Animated Toast Banner after a minor delay
            setTimeout(function() {
                const toast = document.getElementById('ipToast');
                toast.classList.add('show');
            }, 800);
        };

        function closeToast() {
            const toast = document.getElementById('ipToast');
            toast.classList.remove('show');
        }
    </script>
</body>

</html>
